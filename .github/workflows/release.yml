name: Release verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm
      - name: Install dependencies and browser test tooling
        run: |
          npm ci
          npm install --no-save @playwright/test@1.55.0 axe-core@4.10.2
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser regression and accessibility verification
        run: npx playwright test
      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-report
          path: playwright-report/
          retention-days: 30
