name: Release verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install application dependencies
        run: npm ci

      - name: Install browser-test tooling
        run: npm install --no-save @playwright/test@1.55.0 axe-core@4.10.2

      - name: Lint, typecheck, unit tests, and production build
        run: npm run check

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser regression and accessibility verification
        run: npm run test:browser

      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 30
