name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install application dependencies
        run: npm ci

      - name: Install browser-test tooling
        run: npm install --no-save @playwright/test@1.55.0 axe-core@4.10.2

      - name: Lint
        run: npm run lint

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Unit and catalog tests
        run: npm test

      - name: Production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke, regression, persistence, recovery, and axe tests
        run: npm run test:browser

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
