<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">BindForge NW repository thumbnail</title>
  <desc id="desc">A branded preview for a Neverwinter keybind builder showing a dark navy identity panel and a warm command-generation interface.</desc>
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#12263f"/>
      <stop offset="1" stop-color="#173a55"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#f4f0e8"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#navy)"/>
  <circle cx="1080" cy="55" r="235" fill="#49acff" opacity="0.10"/>
  <circle cx="110" cy="590" r="250" fill="#b85b2f" opacity="0.09"/>

  <g transform="translate(62 58)">
    <rect width="72" height="72" rx="18" fill="#56b4ff"/>
    <text x="36" y="47" text-anchor="middle" fill="#06111e" font-family="Arial,sans-serif" font-size="26" font-weight="900">BF</text>
    <text x="96" y="25" fill="#8fd0ff" font-family="Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="4">NEVERWINTER UTILITY</text>
    <text x="96" y="68" fill="#f8fbff" font-family="Arial,sans-serif" font-size="43" font-weight="900">BindForge NW</text>

    <text x="0" y="158" fill="#f8fbff" font-family="Arial,sans-serif" font-size="50" font-weight="900">Build keybinds without</text>
    <text x="0" y="214" fill="#f8fbff" font-family="Arial,sans-serif" font-size="50" font-weight="900">memorizing commands.</text>
    <text x="2" y="258" fill="#c8d9e8" font-family="Arial,sans-serif" font-size="20">Search presets · review safety · copy bind or unbind lines</text>

    <g transform="translate(0 308)">
      <rect width="166" height="42" rx="21" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="83" y="27" text-anchor="middle" fill="#dff3ff" font-family="Arial,sans-serif" font-size="15">Class presets</text>
      <rect x="178" width="184" height="42" rx="21" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="270" y="27" text-anchor="middle" fill="#dff3ff" font-family="Arial,sans-serif" font-size="15">Console commands</text>
      <rect x="374" width="164" height="42" rx="21" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
      <text x="456" y="27" text-anchor="middle" fill="#dff3ff" font-family="Arial,sans-serif" font-size="15">Safety checker</text>
    </g>

    <g transform="translate(0 398)">
      <rect width="212" height="52" rx="10" fill="#56b4ff"/>
      <text x="106" y="33" text-anchor="middle" fill="#06111e" font-family="Arial,sans-serif" font-size="14" font-weight="900" letter-spacing="2">PRODUCT CASE STUDY</text>
