    <rect x="28" y="26" width="434" height="88" rx="12" fill="#fffdf8" stroke="#d8d0c2"/>
    <text x="50" y="53" fill="#b85b2f" font-family="Arial,sans-serif" font-size="12" font-weight="800" letter-spacing="2">GENERATED COMMAND</text>
    <text x="50" y="83" fill="#1e2520" font-family="monospace" font-size="18" font-weight="700">/bind ctrl+b gensendmessage</text>
    <text x="50" y="104" fill="#1e2520" font-family="monospace" font-size="18" font-weight="700">Vipaction_Bankvendor activate</text>

    <g transform="translate(28 138)">
