  <text x="1128" y="606" text-anchor="end" fill="#8fd0ff" opacity="0.72" font-family="Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3">NISCHHALSUBBA / BINDFORGE-NW</text>
</svg>