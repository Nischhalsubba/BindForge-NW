      <text x="66" y="55" text-anchor="middle" fill="#245b47" font-family="Arial,sans-serif" font-size="24" font-weight="900">PRESETS</text>
      <rect x="151" width="132" height="74" rx="10" fill="#f8f3ea" stroke="#d8d0c2"/>
      <text x="217" y="27" text-anchor="middle" fill="#617067" font-family="Arial,sans-serif" font-size="11" font-weight="800">KEYS</text>
      <text x="217" y="55" text-anchor="middle" fill="#245b47" font-family="Arial,sans-serif" font-size="24" font-weight="900">CHECKED</text>
      <rect x="302" width="132" height="74" rx="10" fill="#f8f3ea" stroke="#d8d0c2"/>
      <text x="368" y="27" text-anchor="middle" fill="#617067" font-family="Arial,sans-serif" font-size="11" font-weight="800">COMMANDS</text>
      <text x="368" y="55" text-anchor="middle" fill="#245b47" font-family="Arial,sans-serif" font-size="24" font-weight="900">SEARCH</text>
    </g>

    <g transform="translate(28 238)">
      <text x="0" y="0" fill="#245b47" font-family="Arial,sans-serif" font-size="14" font-weight="900">1. Choose class</text>
      <rect x="0" y="18" width="138" height="42" rx="8" fill="#245b47"/>
      <text x="69" y="45" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="14" font-weight="700">All classes</text>
      <rect x="150" y="18" width="92" height="42" rx="8" fill="#ffffff" stroke="#d8d0c2"/>
      <text x="196" y="45" text-anchor="middle" fill="#1e2520" font-family="Arial,sans-serif" font-size="14">Bard</text>
      <rect x="254" y="18" width="112" height="42" rx="8" fill="#ffffff" stroke="#d8d0c2"/>
      <text x="310" y="45" text-anchor="middle" fill="#1e2520" font-family="Arial,sans-serif" font-size="14">Warlock</text>
    </g>

    <g transform="translate(28 326)">
      <rect width="434" height="94" rx="12" fill="#fffdf8" stroke="#d8d0c2"/>
      <text x="20" y="28" fill="#b85b2f" font-family="Arial,sans-serif" font-size="12" font-weight="800">VIP SERVICES</text>
      <text x="20" y="56" fill="#1e2520" font-family="Arial,sans-serif" font-size="19" font-weight="800">VIP bank</text>
      <text x="20" y="78" fill="#617067" font-family="Arial,sans-serif" font-size="13">Opens the VIP bank vendor.</text>
      <rect x="332" y="27" width="78" height="40" rx="8" fill="#245b47"/>
      <text x="371" y="52" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="13" font-weight="800">COPY</text>
    </g>

    <g transform="translate(28 444)">
      <rect width="205" height="42" rx="9" fill="#245b47"/>
      <text x="102" y="27" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="14" font-weight="800">BIND MODE</text>
      <rect x="229" width="205" height="42" rx="9" fill="#ffffff" stroke="#d8d0c2"/>
      <text x="331" y="27" text-anchor="middle" fill="#617067" font-family="Arial,sans-serif" font-size="14" font-weight="800">UNBIND MODE</text>
    </g>
